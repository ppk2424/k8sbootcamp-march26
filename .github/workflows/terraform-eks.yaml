# terraform apply to whatever path is passed in the workflow dispatch
# terraform apply/destroy to whatever path is passed in the workflow dispatch

# manual deplopy -> multi-env deployment workflow for EKS
---
name: EKS Infra Deploy


on:
  workflow_dispatch:
    inputs:
      apply_or_delete:
        description: 'Apply or Delete'
        required: false
        default: 'apply'
        type: choice
        options:
          - apply
          - destroy
      path:
        description: 'Path to infra code'
        required: true
        type: choice
        options:
          - eks/eks-infra/
          - eks/k8s-services/aws-load-balancer-controller/
          - eks/k8s-services/argocd/
          - logging-monitoring/

env:
  TF_VERSION: 1.8.1
  AWS_REGION: ap-south-1
  

jobs:
  infra-deploy:
    name: EKS Infra Deploy
    runs-on: ubuntu-latest   
    permissions:
      id-token: write
      contents: read   

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::879381241087:role/aws-github-oidc-march26
          role-session-name: GitHub_to_AWS_OIDC_EKSDEP_${{ github.sha }}
          aws-region: ${{ env.AWS_REGION }}
          # aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          # aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          # aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ github.event.inputs.path }}
        run: terraform init
      # - name: Terraform Apply
      #   working-directory: ${{ env.infra_path }}
      #   run: terraform ${{ env.apply_or_delete }} -var-file=vars/${{ env.environment }}.tfvars

      - name: Terraform Apply
        if: ${{ github.event.inputs.apply_or_delete == 'apply' }}
        working-directory: ${{ github.event.inputs.path }}
        run: terraform plan -auto-approve 

      - name: Terraform Destroy
        if: ${{ github.event.inputs.apply_or_delete == 'destroy' }}
        working-directory: ${{ github.event.inputs.path }}
        run: terraform destroy -auto-approve 