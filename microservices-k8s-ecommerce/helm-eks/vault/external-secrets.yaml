# External Secrets - sync Vault secrets to Kubernetes Secrets
# These create the same K8s Secrets that were previously hardcoded

---
# Database credentials
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: db-credentials
  namespace: ecommerce
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: db-credentials
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_USER
      remoteRef:
        key: secret/data/ecommerce/database
        property: username
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: secret/data/ecommerce/database
        property: password

---
# Redis credentials
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: redis-credentials
  namespace: ecommerce
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: redis-credentials
    creationPolicy: Owner
  data:
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: secret/data/ecommerce/redis
        property: password

---
# RabbitMQ credentials
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rabbitmq-credentials
  namespace: ecommerce
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: rabbitmq-credentials
    creationPolicy: Owner
  data:
    - secretKey: RABBITMQ_DEFAULT_USER
      remoteRef:
        key: secret/data/ecommerce/rabbitmq
        property: username
    - secretKey: RABBITMQ_DEFAULT_PASS
      remoteRef:
        key: secret/data/ecommerce/rabbitmq
        property: password

---
# Application secrets (JWT, Razorpay)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: app-secrets
  namespace: ecommerce
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: app-secrets
    creationPolicy: Owner
  data:
    - secretKey: JWT_SECRET
      remoteRef:
        key: secret/data/ecommerce/app
        property: jwt_secret
    - secretKey: RAZORPAY_KEY_ID
      remoteRef:
        key: secret/data/ecommerce/razorpay
        property: key_id
    - secretKey: RAZORPAY_KEY_SECRET
      remoteRef:
        key: secret/data/ecommerce/razorpay
        property: key_secret
    - secretKey: RAZORPAY_WEBHOOK_SECRET
      remoteRef:
        key: secret/data/ecommerce/razorpay
        property: webhook_secret

---
# AWS credentials for notification service
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: aws-credentials
  namespace: ecommerce
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: aws-credentials
    creationPolicy: Owner
  data:
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: secret/data/ecommerce/aws
        property: access_key_id
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: secret/data/ecommerce/aws
        property: secret_access_key
