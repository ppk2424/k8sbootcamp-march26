{{- if .Values.redis.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: {{ include "ecommerce.namespace" . }}
  labels:
    app: redis
    {{- include "ecommerce.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: {{ .Values.redis.image }}
          command: ["redis-server", "--appendonly", "yes", "--maxmemory", {{ .Values.redis.maxMemory | quote }}, "--maxmemory-policy", "allkeys-lru", "--requirepass", {{ .Values.redis.password | quote }}]
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "-a", {{ .Values.redis.password | quote }}, "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: {{ .Values.redis.resources.requests.cpu }}
              memory: {{ .Values.redis.resources.requests.memory }}
            limits:
              cpu: {{ .Values.redis.resources.limits.cpu }}
              memory: {{ .Values.redis.resources.limits.memory }}
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: {{ include "ecommerce.namespace" . }}
  labels:
    app: redis
    {{- include "ecommerce.labels" . | nindent 4 }}
spec:
  selector:
    app: redis
  ports:
    - port: 6379
{{- end }}
