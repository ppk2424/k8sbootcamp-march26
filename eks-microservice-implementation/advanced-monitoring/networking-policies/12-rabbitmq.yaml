# RabbitMQ: order-service publishes, notification-service consumes.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rabbitmq
  namespace: ecommerce
  labels:
    app.kubernetes.io/part-of: ecommerce
    app.kubernetes.io/component: network-policy
spec:
  podSelector:
    matchLabels:
      app: rabbitmq
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: order-service
        - podSelector:
            matchLabels:
              app: notification-service
      ports:
        - protocol: TCP
          port: 5672
