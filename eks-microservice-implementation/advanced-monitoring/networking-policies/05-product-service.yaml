# Product service: api-gateway, cart-service, order-service + Postgres egress.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: product-service
  namespace: ecommerce
  labels:
    app.kubernetes.io/part-of: ecommerce
    app.kubernetes.io/component: network-policy
spec:
  podSelector:
    matchLabels:
      app: product-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway
        - podSelector:
            matchLabels:
              app: cart-service
        - podSelector:
            matchLabels:
              app: order-service
      ports:
        - protocol: TCP
          port: 8001
  egress:
    - to:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: products
      ports:
        - protocol: TCP
          port: 5432
