# User service: api-gateway only + Postgres egress.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: user-service
  namespace: ecommerce
  labels:
    app.kubernetes.io/part-of: ecommerce
    app.kubernetes.io/component: network-policy
spec:
  podSelector:
    matchLabels:
      app: user-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway
      ports:
        - protocol: TCP
          port: 8002
  egress:
    - to:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: users
      ports:
        - protocol: TCP
          port: 5432
