# Global settings
global:
  namespace: ecommerce
  environment: production
  imagePullPolicy: IfNotPresent
  storageClass: gp2
# Redis configuration (password sourced from ESO-managed redis-credentials secret)
redis:
  enabled: true
  image: redis:7-alpine
  maxMemory: 256mb
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi
# RabbitMQ configuration (credentials sourced from ESO-managed rabbitmq-credentials secret)
rabbitmq:
  enabled: true
  image: rabbitmq:3.12-management-alpine
  storage: 1Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
# CloudNativePG database clusters.
# Bootstrap and microservices both use the single ESO secret `db-credentials`
# (POSTGRES_* for apps, username/password for CNPG initdb).
cnpg:
  enabled: true
  image: ghcr.io/cloudnative-pg/postgresql:15.4
  instances: 1
  storage: 1Gi
  postgresql:
    max_connections: "100"
    shared_buffers: "128MB"
    effective_cache_size: "256MB"
    work_mem: "4MB"
    maintenance_work_mem: "64MB"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  monitoring:
    enablePodMonitor: false
  databases:
    - name: products
    - name: users
    - name: orders
    - name: payments
# Microservice deployments. `image` is a full image URI including the tag.
services:
  productService:
    enabled: true
    image: 879381241087.dkr.ecr.ap-south-1.amazonaws.com/ecommerce-product-service:c409234cbc071c9cd7d40387051ce3cbb6821bab
    port: 8001
    replicas: 1
    env: production
    logLevel: info
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 256Mi
  userService:
    enabled: true
    image: 879381241087.dkr.ecr.ap-south-1.amazonaws.com/ecommerce-user-service:c409234cbc071c9cd7d40387051ce3cbb6821bab
    port: 8002
    replicas: 1
    env: production
    jwtExpiry: "24h"
    logLevel: info
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 256Mi
  cartService:
    enabled: true
    image: 879381241087.dkr.ecr.ap-south-1.amazonaws.com/ecommerce-cart-service:c409234cbc071c9cd7d40387051ce3cbb6821bab
    port: 8003
    replicas: 1
    env: production
    logLevel: info
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 256Mi
  orderService:
    enabled: true
    image: 879381241087.dkr.ecr.ap-south-1.amazonaws.com/ecommerce-order-service:c409234cbc071c9cd7d40387051ce3cbb6821bab
    port: 8004
    replicas: 1
    env: production
    logLevel: info
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 256Mi
  paymentService:
    enabled: true
    image: 879381241087.dkr.ecr.ap-south-1.amazonaws.com/ecommerce-payment-service:c409234cbc071c9cd7d40387051ce3cbb6821bab
    port: 8005
    replicas: 1
    env: production
    logLevel: INFO
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi
  notificationService:
    enabled: true
    image: 879381241087.dkr.ecr.ap-south-1.amazonaws.com/ecommerce-notification-service:c409234cbc071c9cd7d40387051ce3cbb6821bab
    port: 8006
    replicas: 1
    env: production
    logLevel: INFO
    aws:
      region: ap-south-1
      sesSenderEmail: noreply@example.com
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 256Mi
# API Gateway (nginx) - exposed via ALB ingress
apiGateway:
  enabled: true
  image: 879381241087.dkr.ecr.ap-south-1.amazonaws.com/ecommerce-api-gateway:c409234cbc071c9cd7d40387051ce3cbb6821bab
  replicas: 1
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi
# Frontend - exposed via ALB ingress
frontend:
  enabled: true
  image: 879381241087.dkr.ecr.ap-south-1.amazonaws.com/ecommerce-frontend:c409234cbc071c9cd7d40387051ce3cbb6821bab
  replicas: 1
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi
# ALB ingress for frontend + api-gateway
ingress:
  enabled: true
  className: alb
  groupName: k8sbatch-shared-alb
  host: shop.livingdevops.org
# Seed Job - runs as a Helm post-install/post-upgrade hook to seed product
# data through the api-gateway. An initContainer waits for the gateway/
# product-service to be reachable so the Job doesn't race the rest of the chart.
seedJob:
  enabled: true
  image: 879381241087.dkr.ecr.ap-south-1.amazonaws.com/ecommerce-seed:c409234cbc071c9cd7d40387051ce3cbb6821bab
  waitImage: busybox:1.36
  waitAttempts: 60
  waitSleepSeconds: 5
  backoffLimit: 5
  ttlSecondsAfterFinished: 300
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi
